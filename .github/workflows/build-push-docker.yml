name: Build & Push Cell

on:
  workflow_dispatch:
    inputs:
      build_dir:
        description: "Build context directory"
        required: true
        default: ""
      dockerfile:
        description: "Dockerfile name (relative to build_dir)"
        required: true
        default: "Dockerfile"
      cell_name:
        description: "Cell (image) name – e.g. input-dev-localhost"
        required: true
      image_version:
        description: "Optional extra version tag (defaults to commit SHA)"
        required: false
        default: ""
      id:
        description: "Run identifier (passed through to job name)"
        required: false
        default: "manual"

# ──────────────────────────────────────────────────────────────────────────────
# In GHCR the image must live inside some repo. We use the *current* repo owner
# plus a dedicated package namespace `naavre-cells`.
# Example result: ghcr.io/jazzleylouisville/naavre-cells/<cell_name>:<tag>
# ──────────────────────────────────────────────────────────────────────────────

env:
  REGISTRY: ghcr.io
  IMAGE_NAMESPACE: ${{ github.repository_owner }}/naavre-cells
  # The final tag is computed later in a step so we can reuse it.

permissions:
  contents: read
  packages: write

jobs:
  build:
    runs-on: ubuntu-latest
    name: Build‑${{ github.event.inputs.id || 'cell' }}

    steps:
      - uses: actions/checkout@v4

      # ───── 1. Log in to GHCR ───────────────────────────────────────────────
      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GHCR_PAT }}

      # ───── 2. Set up Buildx (for cache & multi‑platform) ───────────────────
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # ───── 3. Compute the full image tag(s) ────────────────────────────────
      - id: set-tags
        run: |
          SHA_TAG=${{ github.sha }}
          CELL="${{ github.event.inputs.cell_name }}"
          if [[ -n "${{ github.event.inputs.image_version }}" ]]; then
            EXTRA_TAG="${{ github.event.inputs.image_version }}"
          else
            EXTRA_TAG="${SHA_TAG}"
          fi
          IMAGE_BASE="${{ env.REGISTRY }}/${{ env.IMAGE_NAMESPACE }}/${CELL}"
          echo "IMAGE_SHA=${IMAGE_BASE}:${SHA_TAG}"      >> "$GITHUB_OUTPUT"
          echo "IMAGE_EXTRA=${IMAGE_BASE}:${EXTRA_TAG}"  >> "$GITHUB_OUTPUT"
          echo "IMAGE_LATEST=${IMAGE_BASE}:latest"       >> "$GITHUB_OUTPUT"

      # ───── 4. Build & push ─────────────────────────────────────────────────
      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: ${{ github.event.inputs.build_dir }}
          file: ${{ github.event.inputs.build_dir }}/${{ github.event.inputs.dockerfile }}
          push: true
          tags: |
            ${{ steps.set-tags.outputs.IMAGE_SHA }}
            ${{ steps.set-tags.outputs.IMAGE_EXTRA }}
            ${{ steps.set-tags.outputs.IMAGE_LATEST }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # ───── 5. Output the main tag (sha) so NaaVRE can read it if needed ────
      - name: Export image tag
        run: echo "::set-output name=cell_image::${{ steps.set-tags.outputs.IMAGE_SHA }}"
